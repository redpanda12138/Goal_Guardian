  oa:
    build: ./OA
    init: true
    ports:
      - "8006:8000"
      - "8502:8501"
    env_file:
      - ../.env
    # 无时区预约串按此时区解释（App 已发 UTC ISO 时可忽略）；新加坡可改为 Asia/Singapore
