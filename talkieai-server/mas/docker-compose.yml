# init: true 使用 tini 作为 PID 1，便于 SIGTERM 传递给子进程；避免 sh -c 管道导致 down/stop 长时间挂起
services:
  mma:
    build: ./MMA
    init: true
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_SERVER=${AI_SERVER:-ZHIPU}
      - ZHIPU_AI_API_KEY=${ZHIPU_AI_API_KEY:-}
      - ZHIPU_AI_MODEL=${ZHIPU_AI_MODEL:-glm-4}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1}
      - MAS_MEMORY_REQUIRE_DATABASE=true
    volumes:
      - ./common:/app/common:ro
      - ./MMA/memory:/app/memory
      - ./MMA/logs:/app/logs
    entrypoint: []
    command: >
      sh -c "uvicorn app:app --host 0.0.0.0 --port 8000 2>> /app/logs/error.log | tee /app/logs/print.log"

  soa:
    build: ./SOA
    init: true
    ports:
      - "8002:8000"
    env_file:
      - ../.env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_SERVER=${AI_SERVER:-ZHIPU}
      - ZHIPU_AI_API_KEY=${ZHIPU_AI_API_KEY:-}
      - ZHIPU_AI_MODEL=${ZHIPU_AI_MODEL:-glm-4}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1}
      - MAS_MEMORY_REQUIRE_DATABASE=true
    volumes:
      - ./common:/app/common:ro
      - ./SOA/memory:/app/memory
      - ./SOA/logs:/app/logs
    entrypoint: []
    command: >
      sh -c "uvicorn app:app --host 0.0.0.0 --port 8000 2>> /app/logs/error.log | tee /app/logs/print.log"

  gra:
    build: ./GRA
    init: true
    ports:
      - "8003:8000"
    env_file:
      - ../.env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_SERVER=${AI_SERVER:-ZHIPU}
      - ZHIPU_AI_API_KEY=${ZHIPU_AI_API_KEY:-}
      - ZHIPU_AI_MODEL=${ZHIPU_AI_MODEL:-glm-4}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1}
      - MAS_MEMORY_REQUIRE_DATABASE=true
    volumes:
